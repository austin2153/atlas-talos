apiVersion: platform.kratix.io/v1alpha1
kind: Promise
metadata:
  labels:
    kratix.io/promise-version: v0.0.1
  name: proxmox-vm
spec:
  api:
    apiVersion: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    metadata:
      name: proxmoxvms.atlas.local
    spec:
      group: atlas.local
      names:
        kind: ProxmoxVM
        plural: proxmoxvms
        singular: proxmoxvm
      scope: Namespaced
      versions:
      - name: v1alpha1
        schema:
          openAPIV3Schema:
            properties:
              spec:
                properties:
                  cores:
                    type: integer
                  memory:
                    type: integer
                type: object
            type: object
        served: true
        storage: true
  workflows:
    resource:
      configure:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: proxmox-vm-configure
        spec:
          imagePullSecrets:
          - name: ghcr-pull-secret
          containers:
          - image: ghcr.io/austin2153/proxmox-vm-pipeline:v0.1.2
            name: ghcr-io-austin2153-proxmox-vm-pipeline
            envFrom:
            - secretRef:
                name: proxmox-credentials
      delete:
      - apiVersion: platform.kratix.io/v1alpha1
        kind: Pipeline
        metadata:
          name: proxmox-vm-delete
        spec:
          imagePullSecrets:
          - name: ghcr-pull-secret
          containers:
          - image: ghcr.io/austin2153/proxmox-vm-pipeline:v0.1.2
            name: ghcr-io-austin2153-proxmox-vm-pipeline
            envFrom:
            - secretRef:
                name: proxmox-credentials
