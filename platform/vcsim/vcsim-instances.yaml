---
# vcenter-01
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcenter-01
  namespace: vcsim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vcenter-01
  template:
    metadata:
      labels:
        app: vcenter-01
    spec:
      containers:
      - name: vcsim
        image: vmware/vcsim:latest
        args: ["-l", "0.0.0.0:443"]
        ports:
        - containerPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: vcenter-01
  namespace: vcsim
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.20.52
  selector:
    app: vcenter-01
  ports:
  - port: 443
    targetPort: 443
