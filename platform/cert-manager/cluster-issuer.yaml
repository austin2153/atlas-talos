# Bootstrap a self-signed root CA, then a CA ClusterIssuer for all downstream certs.
# Sync waves ensure cert-manager CRDs and controller are ready before these are applied.

# Wave 1: self-signed issuer to bootstrap the root CA cert
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  selfSigned: {}
---
# Wave 2: root CA certificate signed by the selfsigned issuer
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: atlas-root-ca
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  isCA: true
  commonName: atlas-root-ca
  secretName: atlas-root-ca-secret
  duration: 87600h  # 10 years
  renewBefore: 720h # 30 days
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
    group: cert-manager.io
---
# Wave 3: CA ClusterIssuer backed by the root CA — use this for everything
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: atlas-ca
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  ca:
    secretName: atlas-root-ca-secret
